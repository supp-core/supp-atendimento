server {
    # Nginx vai escutar na porta 80 dentro da rede Docker
    listen 80;

    # O diretório raiz do seu projeto Symfony
    root /var/www/html/public;
    index index.php;

    location / {
        # Tenta servir o arquivo diretamente, se não encontrar, passa para o index.php (Symfony)
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        # IMPORTANTE: Passa a requisição para o serviço 'php' na porta 9000
        fastcgi_pass php:9000;
        
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Retorna 404 para qualquer outra tentativa de acesso a arquivos .php
    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}