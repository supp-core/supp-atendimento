version: '3.8'
services:
  frontend:
    build:
      context: .
      dockerfile: ./docker/node/Dockerfile
    container_name: dev_frontend_app
    restart: unless-stopped
    ports:
      - "6173:5173"
    volumes:
      - ./supp-atendimento-front-end:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: dev_php_app
    restart: unless-stopped
    volumes:
      - ./supp-atendimento-back-end:/var/www/html
      - vendor_volume:/var/www/html/vendor
    env_file:
      - ./supp-atendimento-back-end/.env
    depends_on:
      - postgres
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: dev_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: supp_atendimento_db_dev
    ports:
      - "6432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - app-network
volumes:
  postgres_data_dev:
  vendor_volume:
networks:
  app-network:
    driver: bridge