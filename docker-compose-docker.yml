version: '3.8'

services:
  # Serviço PHP/Symfony (Backend)
  backend:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: prod-backend
    volumes:
      - ./supp-atendimento-back-end:/var/www/html
    networks:
      - prod-network
    depends_on:
      - database
    environment:
      - APP_ENV=prod
      - MAILER_DSN=smtp://supp-mailhog:1025
      - DATABASE_URL=postgresql://postgres:danilo@database:5432/supp-atendimento?serverVersion=16&charset=utf8

  # Serviço PostgreSQL (Banco de dados local para dev)
  database:
    image: postgres:16-alpine
    container_name: supp-database
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=danilo
      - POSTGRES_DB=supp-atendimento
    ports:
      - "5432:5432"
    volumes:
      - supp-pgdata:/var/lib/postgresql/data
    networks:
      - prod-network

  # Serviço Frontend (Vue SPA + proxy /api → backend)
  frontend:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    container_name: supp-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - prod-network
  
  # Serviço Mailhog para testes de e-mail
  mailhog:
    image: mailhog/mailhog
    container_name: supp-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - prod-network

networks:
  prod-network:
    driver: bridge

volumes:
  supp-pgdata:

