apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supp-atendimento-ingress
  namespace: supp-atendimento
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - supp-atendimento.pgmbh.org
      secretName: supp-pgmbh-tls-secret
  rules:
    - host: supp-atendimento.pgmbh.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webserver
                port:
                  number: 80
