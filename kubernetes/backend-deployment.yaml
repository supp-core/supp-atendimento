apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: supp-atendimento
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      restartPolicy: Always
      containers:
        - name: backend
          image: suppregistry.azurecr.io/supp-atendimento/backend:1.0.0
          ports:
            - containerPort: 9000
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: env-prod
              mountPath: /env-prod
              readOnly: true
            - name: jwt-keys
              mountPath: /var/www/html/config/jwt
              readOnly: true
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - cp /env-prod/.env.prod /var/www/html/.env.prod
      volumes:
        - name: env-prod
          secret:
            secretName: supp-atendimento-env
        - name: jwt-keys
          secret:
            secretName: supp-atendimento-jwt
